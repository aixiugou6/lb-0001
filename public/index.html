<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人运动计划管理器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🏋️ 个人运动计划管理器</h1>
      <div class="nav-tabs">
        <button class="nav-tab active" data-tab="plans">📋 训练计划</button>
        <button class="nav-tab" data-tab="templates">📝 训练模板</button>
      </div>
    </header>

    <section class="stats-section">
      <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-info">
          <h3>本周计划</h3>
          <p id="week-total">0</p>
        </div>
      </div>
      <div class="stat-card completed">
        <div class="stat-icon">✅</div>
        <div class="stat-info">
          <h3>已完成</h3>
          <p id="week-completed">0</p>
        </div>
      </div>
      <div class="stat-card duration">
        <div class="stat-icon">⏱️</div>
        <div class="stat-info">
          <h3>本周总时长</h3>
          <p><span id="week-duration">0</span> 分钟</p>
        </div>
      </div>
      <div class="stat-card monthly-count">
        <div class="stat-icon">🏃</div>
        <div class="stat-info">
          <h3>本月训练次数</h3>
          <p id="month-records">0</p>
        </div>
      </div>
      <div class="stat-card monthly-duration">
        <div class="stat-icon">🔥</div>
        <div class="stat-info">
          <h3>本月训练时长</h3>
          <p><span id="month-duration">0</span> 分钟</p>
        </div>
      </div>
      <div class="stat-card completion-rate">
        <div class="stat-icon">📊</div>
        <div class="stat-info">
          <h3>本周完成率</h3>
          <p><span id="week-completion-rate">0</span>%</p>
        </div>
      </div>
    </section>

    <div id="tab-plans" class="tab-content active">
      <section class="week-view-section">
        <h2>本周训练计划</h2>
        <div id="week-view" class="week-view"></div>
      </section>

      <section class="filter-section">
        <div class="filter-group">
          <label>类型筛选</label>
          <select id="filter-type">
            <option value="all">全部类型</option>
          </select>
        </div>
        <div class="filter-group">
          <label>日期筛选</label>
          <input type="date" id="filter-date">
        </div>
        <div class="filter-group">
          <label>完成状态</label>
          <select id="filter-completed">
            <option value="all">全部状态</option>
            <option value="false">未完成</option>
            <option value="true">已完成</option>
          </select>
        </div>
        <div class="filter-group">
          <button id="btn-week" class="btn btn-outline">本周</button>
          <button id="btn-reset" class="btn btn-secondary">重置筛选</button>
        </div>
      </section>

      <section class="action-section">
        <button id="btn-add" class="btn btn-primary">+ 新增计划</button>
      </section>

      <section class="plans-section">
        <h2>
          运动计划列表
          <span id="plans-count" class="plans-count"></span>
        </h2>
        <div id="plans-list" class="plans-list">
        </div>
        <div id="empty-state" class="empty-state" style="display: none;">
          <p>暂无运动计划，点击"新增计划"开始吧！</p>
        </div>
      </section>
    </div>

    <div id="tab-templates" class="tab-content">
      <section class="action-section">
        <button id="btn-add-template" class="btn btn-primary">+ 新增模板</button>
      </section>

      <section class="templates-section">
        <h2>
          训练模板列表
          <span id="templates-count" class="plans-count"></span>
        </h2>
        <div id="templates-list" class="templates-list">
        </div>
        <div id="templates-empty-state" class="empty-state" style="display: none;">
          <p>暂无训练模板，点击"新增模板"开始创建常用训练吧！</p>
        </div>
      </section>
    </div>

    <section id="detail-section" class="detail-section" style="display: none;">
      <div class="detail-header">
        <button id="btn-back" class="btn btn-outline">← 返回列表</button>
        <h2 id="detail-title">计划详情</h2>
      </div>
      <div id="detail-content" class="detail-content"></div>
    </section>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">新增运动计划</h2>
        <button id="btn-close" class="btn-close">&times;</button>
      </div>
      <form id="plan-form">
        <input type="hidden" id="plan-id">
        <div id="template-selector-group" class="form-group">
          <label for="plan-template">从模板快速带入</label>
          <select id="plan-template">
            <option value="">-- 不使用模板，手动填写 --</option>
          </select>
        </div>
        <div class="form-group">
          <label for="plan-name">训练名称 <span class="required">*</span></label>
          <input type="text" id="plan-name" required placeholder="例如：晨跑5公里">
        </div>
        <div class="form-group">
          <label for="plan-type">训练类型 <span class="required">*</span></label>
          <select id="plan-type" required>
            <option value="">请选择类型</option>
            <option value="有氧">有氧</option>
            <option value="力量">力量</option>
            <option value="柔韧">柔韧</option>
            <option value="恢复">恢复</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="plan-date">计划日期 <span class="required">*</span></label>
          <input type="date" id="plan-date" required>
        </div>
        <div class="form-group">
          <label for="plan-duration">预计时长（分钟） <span class="required">*</span></label>
          <input type="number" id="plan-duration" min="1" required placeholder="例如：30">
        </div>
        <div class="form-group">
          <label for="plan-completed">
            <input type="checkbox" id="plan-completed">
            标记为已完成
          </label>
        </div>
        <div class="form-group">
          <label for="plan-notes">备注</label>
          <textarea id="plan-notes" rows="3" placeholder="记录训练感受或注意事项..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="btn-cancel" class="btn btn-secondary">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div id="record-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="record-modal-title">新增训练记录</h2>
        <button id="btn-record-close" class="btn-close">&times;</button>
      </div>
      <form id="record-form">
        <input type="hidden" id="record-id">
        <input type="hidden" id="record-plan-id">
        <div class="form-group">
          <label for="record-date">训练日期 <span class="required">*</span></label>
          <input type="date" id="record-date" required>
        </div>
        <div class="form-group">
          <label for="record-duration">实际时长（分钟） <span class="required">*</span></label>
          <input type="number" id="record-duration" min="1" required placeholder="例如：30">
        </div>
        <div class="form-group">
          <label for="record-calories">消耗估算（千卡）</label>
          <input type="number" id="record-calories" min="0" placeholder="例如：280">
        </div>
        <div class="form-group">
          <label for="record-feeling">感受备注</label>
          <textarea id="record-feeling" rows="3" placeholder="记录训练感受、身体状态..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="btn-record-cancel" class="btn btn-secondary">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div id="confirm-modal" class="modal">
    <div class="modal-content modal-small">
      <h3>确认删除</h3>
      <p id="confirm-message">确定要删除这个运动计划吗？</p>
      <div class="form-actions">
        <button id="btn-cancel-delete" class="btn btn-secondary">取消</button>
        <button id="btn-confirm-delete" class="btn btn-danger">删除</button>
      </div>
    </div>
  </div>

  <div id="template-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="template-modal-title">新增训练模板</h2>
        <button id="btn-template-close" class="btn-close">&times;</button>
      </div>
      <form id="template-form">
        <input type="hidden" id="template-id">
        <div class="form-group">
          <label for="template-name">模板名称 <span class="required">*</span></label>
          <input type="text" id="template-name" required placeholder="例如：标准晨跑">
        </div>
        <div class="form-group">
          <label for="template-type">训练类型 <span class="required">*</span></label>
          <select id="template-type" required>
            <option value="">请选择类型</option>
            <option value="有氧">有氧</option>
            <option value="力量">力量</option>
            <option value="柔韧">柔韧</option>
            <option value="恢复">恢复</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="template-duration">默认时长（分钟） <span class="required">*</span></label>
          <input type="number" id="template-duration" min="1" required placeholder="例如：30">
        </div>
        <div class="form-group">
          <label for="template-description">动作说明</label>
          <textarea id="template-description" rows="4" placeholder="详细说明训练动作、组数、次数等..."></textarea>
        </div>
        <div class="form-group">
          <label for="template-notes">备注</label>
          <textarea id="template-notes" rows="2" placeholder="记录注意事项或训练要点..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="btn-template-cancel" class="btn btn-secondary">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
